<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Dossier Agent // ARK</title>
</head>
<body>
    <div class="container">
        
        <!-- C'EST CETTE LIGNE QUI AFFICHE LE NOM COMPLET EN GROS -->
        <h1 id="f_nom">Chargement...</h1>
        
        <div class="profile-layout">
            <!-- Colonne de Gauche : Infos Techniques -->
            <aside class="infobox">
                <img id="f_img" style="width:100%; border: 1px solid #00ff00; margin-bottom: 15px;">
                <div id="f_details" class="data-scan">
                    <!-- Les détails automatisés vont s'injecter ici -->
                </div>
            </aside>
            
            <!-- Colonne de Droite : Histoire Générale -->
            <main>
                <h3>RAPPORT D'ACTIVITÉ & ANAMNÈSE</h3>
                <p id="f_histoire">En attente de décryptage des données...</p>
            </main>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function chargerFiche() {
            // 1. On récupère l'ID dans l'URL (ex: fiche.html?id=1)
            const id = new URLSearchParams(window.location.search).get('id');
            
            if(!id) {
                document.getElementById('f_nom').innerText = "ERREUR : AUCUN ID SPÉCIFIÉ";
                return;
            }

            // 2. On interroge Supabase
            const { data: p, error } = await supabase.from('personnages').select('*').eq('id', id).single();
            
            if (error) {
                document.getElementById('f_nom').innerText = "SUJET INTROUVABLE";
                console.error(error);
                return;
            }

            // 3. On injecte les données de base
            // C'est ici que p.nom remplace le texte "Chargement..." du <h1>
            document.getElementById('f_nom').innerText = p.nom;
            document.getElementById('f_img').src = p.image_url; 
            document.getElementById('f_histoire').innerText = p.histoire_complète; 

            // 4. On injecte tout ton Lore dans l'infobox de gauche
            document.getElementById('f_details').innerHTML = `
                <p><strong>STATUT :</strong> ${p.statut || 'Inconnu'}</p>
                <p><strong>SITUATION :</strong> ${p.situation || 'Inconnue'}</p>
                <p><strong>ESPÈCE :</strong> ${p.espece || 'Non identifiée'}</p>
                <p><strong>SEXE :</strong> ${p.sexe || 'Inconnu'}</p>
                <p><strong>NAISSANCE :</strong> ${p.date_naissance || 'Inconnue'}</p>
                <p><strong>LOCALISATION :</strong> ${p.localisation || 'Inconnue'}</p>
                <p><strong>ACTIVITÉ :</strong> ${p.activité || 'Inconnue'}</p>
                <hr style="border-color: #00ff00;">
                <p><strong>AFFILIATIONS :</strong> ${p.affiliations || 'Aucune'}</p>
                <p><strong>FAMILLE :</strong> ${p.famille || 'Aucune'}</p>
                <p><strong>AMIS :</strong> ${p.amis || 'Aucun'}</p>
                <p><strong>RELATIONS :</strong> ${p.relations || 'Neutres'}</p>
                <p><strong>ENNEMIS :</strong> ${p.ennemis || 'Inconnus'}</p>
                <hr style="border-color: #00ff00;">
                <p><small>INTERPRÈTE : ${p.interprète || 'N/A'}</small></p>
                <p><small>ROLEPLAYER : ${p.roleplayer || 'N/A'}</small></p>
            `;
        }
        
        // Lancement automatique au chargement de la page
        chargerFiche();
    </script>
</body>
</html>
