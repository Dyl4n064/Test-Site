<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail de Sécurité // ARK</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d0e12; color: #d1d5db; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        
        /* Effet balayage écran CRT */
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 10; background-size: 100% 4px, 6px 100%; pointer-events: none; }

        .terminal-box { width: 90%; max-width: 550px; background: rgba(17, 24, 39, 0.85); border: 2px solid #00ff66; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); padding: 30px; text-align: center; border-radius: 4px; z-index: 5; }
        h1 { font-size: 1.6rem; color: #00ff66; margin-bottom: 15px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; text-align: left; }
        input { width: 100%; background: #000; border: 1px solid #00ff66; color: #fff; padding: 12px; font-family: monospace; }
        .terminal-btn { background: transparent; color: #00ff66; border: 2px solid #00ff66; padding: 12px 30px; cursor: pointer; text-transform: uppercase; font-weight: bold; width: 100%; }
        .terminal-btn:hover { background: #00ff66; color: #000; }
        #auth-error { color: #ff3333; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="terminal-box">
        <h1>Initialisation Agent</h1>
        <div class="input-group">
            <input type="text" id="auth_username" placeholder="IDENTITÉ DE L'AGENT...">
        </div>
        <button class="terminal-btn" onclick="creerCompte()">[ ACCÉDER AU SYSTÈME ]</button>
        <div id="auth-error"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function creerCompte() {
            const username = document.getElementById('auth_username').value;
            const errorDiv = document.getElementById('auth-error');

            if (!username) { errorDiv.innerText = "ERREUR : Identité requise."; return; }
            errorDiv.innerText = "[ CONNEXION ANONYME... ]";

            // 1. Connexion anonyme
            const { error: authError } = await supabaseClient.auth.signInAnonymously();
            if (authError) { errorDiv.innerText = "ERREUR : " + authError.message; return; }

            // 2. Enregistrement du nom dans la table agents
            const { error: dbError } = await supabaseClient
                .from('agents') 
                .insert([{ nom_agent: username }]);

            if (dbError) {
                errorDiv.innerText = "ERREUR BASE : " + dbError.message;
            } else {
                window.location.href = 'registre.html';
            }
        }
    </script>
</body>
</html>
