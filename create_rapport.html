<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rédaction Rapport</title>
</head>
<body>
    <div class="container">
        
        <div class="terminal-header" style="margin-bottom: 20px;">
            <button class="btn-retour" onclick="window.location.href='rapports.html'" style="width: auto; padding: 7px 15px;">[ANNULER LA SAISIE]</button>
        </div>

        <h1>RÉDACTION DE RAPPORT D'ENQUÊTE</h1>
        
        <div class="field"><label>Titre de l'enquête</label><input type="text" id="f_titre" placeholder="Ex: Incident du Laboratoire..."></div>
        <div class="field"><label>Auteur du rapport (Agent)</label><input type="text" id="f_auteur" placeholder="Ex: L. Kennedy"></div>
        <div class="field"><label>URL Photo de couverture (Optionnel)</label><input type="text" id="f_image_url" placeholder="https://..."></div>
        
        <div class="field"><label>Contenu détaillé du rapport</label><textarea id="f_contenu" rows="15" placeholder="Saisissez les détails de l'investigation ici..."></textarea></div>
        
        <button onclick="publierRapport()" style="margin-top: 20px;">TRANSMETTRE AUX SERVEURS</button>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function publierRapport() {
            const btn = document.querySelector('button[onclick="publierRapport()"]');
            const originalText = btn.innerText;
            btn.innerText = "[ TRANSMISSION EN COURS... ]";

            const dataForm = {
                titre: document.getElementById('f_titre').value,
                auteur_enquete: document.getElementById('f_auteur').value || 'Inconnu',
                image_url: document.getElementById('f_image_url').value,
                contenu: document.getElementById('f_contenu').value 
            };

            if (!dataForm.titre || !dataForm.contenu) {
                alert("ERREUR : Le titre et le contenu sont obligatoires.");
                btn.innerText = originalText;
                return;
            }

            // Insertion des données via Supabase[cite: 1]
            const { data, error } = await supabaseClient
                .from('rapports_enquete')
                .insert([dataForm])
                .select(); 
            
            if (error) { 
                alert("ERREUR: " + error.message); 
                console.error(error);
                btn.innerText = originalText;
            } else { 
                alert("SUCCÈS: Rapport classifié dans la base de données."); 
                window.location.href = 'fiche_rapport.html?id=' + data[0].id; 
            }
        }
    </script>
</body>
</html>
