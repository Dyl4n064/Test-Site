<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registre Central</title>
</head>
<body>
    <div class="container container-roster"> 

        <div class="terminal-header">
            <button class="btn-retour" onclick="window.location.href='registre.html'">[RETOUR]</button>
            <button class="btn-retour btn-enregistrer" onclick="window.location.href='create.html'">[NOUVEL ENREGISTREMENT]</button>
        </div>
        
        <h1>REGISTRE DES SUJETS</h1>
        <div class="roster-grid" id="grille-dynamique">Chargement des données...</div>
    </div>
    
    <div class="mentions-legales">
        <p><strong>Mentions Légales :</strong> Ce registre est édité à titre personnel par Dyl4n06. Contact : dylancapron064@gmail.com.</p>
        <p>Hébergement : GitHub Pages (GitHub Inc., 88 Colin P Kelly Jr St, San Francisco, CA 94107, USA).</p>
    </div>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function chargerRoster() {
            const { data: p, error } = await supabaseClient
                .from('personnages')
                .select('*')
                .order('nom', { ascending: true });
            
            if (error) {
                console.error("Erreur de connexion :", error);
                document.getElementById('grille-dynamique').innerHTML = "<p>Erreur de connexion à la base de données.</p>";
                return;
            }

            document.getElementById('grille-dynamique').innerHTML = p.map(perso => {
                const statutTexte = perso.statut ? perso.statut.toLowerCase() : "";
                const isDead = statutTexte.includes('décédé');
                
                const imageSrc = perso.image_url && perso.image_url.startsWith('http') 
                    ? perso.image_url
                    : `images/${perso.image_url}`;

                return `
                    <a href="fiche.html?id=${perso.id}" class="card ${isDead ? 'status-decédé' : ''}" style="display: block; text-decoration: none; color: inherit;">
                        <img src="${imageSrc}" style="width:100%; height:200px; object-fit:cover; border-bottom: 2px solid #555;">
                        <h3 style="margin: 10px 0 5px 0;">${perso.nom}</h3>
                        <p style="font-size: 0.9em; color: #aaa;">STATUT: ${perso.statut || "Inconnu"}</p>
                    </a>
                `;
            }).join('');
        }
        
        chargerRoster();
    </script>
</body>
</html>
