<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registre Biologique</title>
    
    <style>
        /* Effet de glissement pour le bouton d'enregistrement */
        .btn-enregistrer {
            position: relative;
            left: 0;
            transition: left 0.3s ease !important; 
        }
        .btn-enregistrer:hover {
            left: 15px; 
        }
        
        /* Style "Terminal" pour les séparateurs de rubriques */
        .categorie-titre {
            color: var(--accent-color, #ff0000);
            border-bottom: 1px solid var(--accent-color, #ff0000);
            padding-bottom: 5px;
            margin-top: 50px;
            margin-bottom: 20px;
            font-size: 1.2em;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container" style="padding-bottom: 60px;">
        
        <div class="terminal-header" style="display: flex; justify-content: space-between; align-items: center;">
            <button class="btn-retour" onclick="window.location.href='registre.html'" style="width: auto; padding: 7px 15px;">[RETOUR]</button>
            <button class="btn-retour btn-enregistrer" onclick="window.location.href='create_souche.html'" style="width: auto; padding: 7px 15px;">[NOUVEL ENREGISTREMENT]</button>
        </div>

        <h1>BASE DE DONNÉES PATHOGÈNES</h1>
        
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="[ RECHERCHER UNE SOUCHE... ]" onkeyup="filtrerSouches()" autocomplete="off">
        </div>
        
        <div id="contenu-souches">Chargement de la base de données...</div>
    </div>
    
    <div class="mentions-legales">
        <p><strong>Mentions Légales :</strong> Ce registre est édité à titre personnel par Dyl4n06. Contact : dylancapron064@gmail.com.</p>
        <p>Hébergement : GitHub Pages (GitHub Inc., 88 Colin P Kelly Jr St, San Francisco, CA 94107, USA).</p>
    </div>
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function chargerSouches() {
            // 1. Récupération des données triées par ordre alphabétique
            const { data: s, error } = await supabaseClient
                .from('souches')
                .select('*')
                .order('nom', { ascending: true });
            
            if (error) {
                console.error("Erreur de connexion :", error);
                document.getElementById('contenu-souches').innerHTML = "<p>Erreur de connexion à la base de données.</p>";
                return;
            }

            // 2. Préparation des rubriques dans l'ordre demandé
            const categories = [
                { id: 'viral', titre: 'VIRAL', items: [] },
                { id: 'parasitaire', titre: 'PARASITAIRE', items: [] },
                { id: 'fongique', titre: 'FONGIQUE', items: [] },
                { id: 'armes', titre: 'ARMES BIOLOGIQUES', items: [] },
                { id: 'vaccins', titre: 'VACCINS', items: [] },
                { id: 'autres', titre: 'AUTRES DOSSIERS', items: [] }
            ];

            // 3. Tri des souches dans les bonnes catégories
            s.forEach(souche => {
                const type = (souche.type || '').toLowerCase();
                
                if (type.includes('viral') || type.includes('virus')) {
                    categories[0].items.push(souche);
                } else if (type.includes('parasit')) {
                    categories[1].items.push(souche);
                } else if (type.includes('fongique') || type.includes('champignon')) {
                    categories[2].items.push(souche);
                } else if (type.includes('arme') || type.includes('b.o.w') || type.includes('bow')) {
                    categories[3].items.push(souche);
                } else if (type.includes('vaccin') || type.includes('remède') || type.includes('remede')) {
                    categories[4].items.push(souche);
                } else {
                    categories[5].items.push(souche);
                }
            });

            // 4. Construction du code HTML final
            let htmlOutput = '';
            
            categories.forEach(cat => {
                if (cat.items.length > 0) {
                    htmlOutput += `<h2 class="categorie-titre">> ${cat.titre}</h2>`;
                    htmlOutput += `<div class="roster-grid">`;
                    
                    htmlOutput += cat.items.map(souche => {
                        const imageSrc = souche.image_url && souche.image_url.startsWith('http') 
                            ? souche.image_url
                            : `images/${souche.image_url || 'default.jpg'}`;

                        // Ajout de la classe "nom-souche" sur le h3 pour faciliter la recherche
                        return `
                            <a href="fiche_souche.html?id=${souche.id}" class="card" style="display: block; text-decoration: none; color: inherit;">
                                <img src="${imageSrc}" style="width:100%; height:200px; object-fit:cover; border-bottom: 2px solid #555;">
                                <h3 class="nom-souche" style="margin: 10px 0 5px 0;">${souche.nom}</h3>
                                <p style="font-size: 0.9em; color: #aaa; margin: 5px 0;">TYPE: ${souche.type || "Inconnu"}</p>
                                <p style="font-size: 0.9em; color: #aaa; margin: 5px 0;">DANGER: ${souche.dangerosite || "Non défini"}</p>
                            </a>
                        `;
                    }).join('');
                    
                    htmlOutput += `</div>`;
                }
            });

            if(htmlOutput === '') {
                htmlOutput = "<p>Aucun pathogène détecté dans la base de données.</p>";
            }

            document.getElementById('contenu-souches').innerHTML = htmlOutput;
        }
        
        // NOUVEAU : Fonction de filtrage en direct avec gestion des rubriques
        function filtrerSouches() {
            const texteRecherche = document.getElementById('search-input').value.toLowerCase();
            const titresCategories = document.querySelectorAll('.categorie-titre');
            const grilles = document.querySelectorAll('.roster-grid');

            grilles.forEach((grille, index) => {
                const cartes = grille.querySelectorAll('.card');
                let cartesVisibles = 0;

                cartes.forEach(carte => {
                    // On cible spécifiquement la classe qu'on a ajoutée au titre
                    const nom = carte.querySelector('.nom-souche').innerText.toLowerCase();
                    
                    if (nom.includes(texteRecherche)) {
                        carte.style.display = 'block';
                        cartesVisibles++;
                    } else {
                        carte.style.display = 'none';
                    }
                });

                // Si aucune carte n'est visible dans cette grille, on cache aussi le titre de la catégorie !
                if (cartesVisibles === 0) {
                    grille.style.display = 'none';
                    if(titresCategories[index]) titresCategories[index].style.display = 'none';
                } else {
                    grille.style.display = 'grid';
                    if(titresCategories[index]) titresCategories[index].style.display = 'block';
                }
            });
        }

        chargerSouches();
    </script>
</body>
</html>
