<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <title>Rapport d'Enquête</title>

    <style>
        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 50px;
        }

        /* LE DOSSIER NUMÉRIQUE : Noir profond, bordures et ombres vertes */
        .dossier-wrapper {
            background-color: rgba(5, 5, 5, 0.95); 
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        /* --- STYLES DU DOSSIER TERMINAL --- */
        .dossier-header-doc { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding: 30px 40px 20px 40px; 
            border-bottom: 1px dashed var(--accent-color); 
            margin-bottom: 30px; 
        }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-section img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px var(--accent-color)); }
        .logo-text { font-size: 22px; font-weight: bold; letter-spacing: 2px; color: var(--accent-color); }
        .meta-section { color: var(--accent-color); font-size: 14px; line-height: 1.6; text-align: right; }
        
        .titre-rapport { 
            padding: 0 40px; 
            font-size: 38px; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #fff; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .photo-container { 
            position: relative; width: 80%; margin: 30px auto; 
            border: 1px solid var(--accent-color);
            padding: 5px; 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); 
            background: #000;
        }
        .photo-container img { width: 100%; height: auto; max-height: 400px; object-fit: cover; opacity: 0.9; filter: grayscale(20%) contrast(1.2); }
        
        .info-grid { 
            margin: 0 40px 30px 40px; 
            border: 1px solid var(--accent-color); 
            display: grid; grid-template-columns: 1fr 1fr; 
            font-size: 15px; background: rgba(0, 255, 65, 0.05); 
        }
        .info-grid div { padding: 12px; border: 1px solid var(--accent-color); color: var(--accent-color); }
        
        .contenu-digital { 
            padding: 0 40px 10px 40px; 
            font-size: 18px; 
            line-height: 1.6; 
            color: var(--text-color); 
            white-space: pre-wrap; 
            min-height: 200px; 
        }

        /* LE STYLE POUR LES TITRES DE SECTIONS AGRANDIS (##) */
        .section-titre {
            font-size: 28px;
            color: var(--accent-color);
            margin-top: 35px;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
        }

        /* LE STYLE POUR LES SOUS-TITRES (#) */
        .sous-titre {
            font-size: 22px;
            color: var(--accent-color);
            margin-top: 25px;
            margin-bottom: 10px;
            font-weight: bold;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
        }

        .dossier-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 40px; border-top: 1px dashed var(--accent-color); 
        }
        .confidentiel-stamp { color: var(--danger-color); font-weight: bold; font-size: 16px; text-align: right; text-transform: uppercase; letter-spacing: 2px; }
        .confidentiel-stamp span { display: block; font-size: 11px; color: var(--text-color); letter-spacing: 0; margin-top: 5px; }

        /* --- STYLES DE PAGINATION & ÉDITION --- */
        .pagination-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px 30px 40px; font-size: 16px; color: var(--accent-color);
        }
        .pagination-bar button {
            background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color);
            padding: 8px 15px; cursor: pointer; font-weight: bold; transition: 0.2s; font-family: 'Share Tech Mono', monospace;
        }
        .pagination-bar button:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border-color); color: var(--border-color); }
        .pagination-bar button:hover:not(:disabled) { background: var(--accent-color); color: #000; box-shadow: 0 0 10px var(--accent-color); }
        
        .photo-incrustee {
            display: block; max-width: 90%; margin: 20px auto;
            border: 1px solid var(--accent-color); box-shadow: 0 0 10px rgba(0,255,65,0.2);
        }

        .edit-input {
            width: 100%; background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid var(--accent-color) !important; color: var(--accent-color) !important;
            font-family: 'Share Tech Mono', monospace !important; font-size: 16px;
            padding: 12px; box-sizing: border-box; box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }
        textarea.edit-input { height: 400px; resize: vertical; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <div class="terminal-header" id="content_layout" style="display: none; width: 100%; max-width: 800px; justify-content: center; gap: 20px;">
            <button class="btn-retour" onclick="window.location.href='rapports.html'" style="width: auto;">[RETOUR AUX ARCHIVES]</button>
            <button class="btn-retour btn-enregistrer" id="btn_mode" onclick="basculerMode()" style="width: auto;">[ÉDITER LE RAPPORT]</button>
        </div>

        <div class="dossier-wrapper">
            
            <div class="dossier-header-doc">
                <div class="logo-section">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Umbrella_Corporation_logo.svg/512px-Umbrella_Corporation_logo.svg.png" alt="Logo">
                    <div class="logo-text">UMBRELLA<br><span style="font-size:14px; font-weight:normal; color: var(--text-color);">RED QUEEN DB</span></div>
                </div>
                <div class="meta-section">
                    ID SYSTÈME : <span id="r_id_display">CHARGEMENT...</span><br>
                    NIVEAU D'ACCÈS : OMEGA<br>
                    HORODATAGE : <span id="r_date_display">--.--.----</span>
                </div>
            </div>

            <div class="titre-rapport" id="r_titre_container">
                <span style="font-size: 18px; color: var(--accent-color);">RAPPORT D'ENQUÊTE //</span><br>
                <span id="r_titre">CHARGEMENT...</span>
            </div>

            <div class="photo-container" id="bloc_photo_principale">
                <img id="r_img" src="" alt="Fichier Visuel">
            </div>

            <div class="info-grid" id="r_details"></div>

            <div class="contenu-digital" id="r_contenu"></div>

            <div class="pagination-bar" id="pagination_ui" style="display: none;">
                <button id="btn_prev" onclick="changerPage(-1)">&lt; PAGE PRÉCÉDENTE</button>
                <span id="page_info">PAGE 1 / 1</span>
                <button id="btn_next" onclick="changerPage(1)">PAGE SUIVANTE &gt;</button>
            </div>

            <div class="dossier-footer">
                <div style="font-size: 20px; color: var(--accent-color);">*UBC-SECURE-FILE*</div>
                <div class="confidentiel-stamp">
                    RESTREINT
                    <span>Violation du protocole passible d'exécution.</span>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let r = {}; 
        let id = null;
        let modeEdition = false;
        let pagesArray = [];
        let pageCourante = 0;

        async function chargerFiche() {
            id = new URLSearchParams(window.location.search).get('id');
            if (!id) return showError("ERREUR : ID MANQUANT");

            const { data, error } = await supabaseClient.from('rapports_enquete').select('*').eq('id', id).single();
            if (error || !data) return showError("DONNÉES CORROMPUES OU INTROUVABLES");

            r = data;
            document.getElementById('content_layout').style.display = "flex";
            afficherModeLecture();
        }

        function showError(msg) {
            document.getElementById('r_titre').innerText = msg;
            document.getElementById('content_layout').style.display = "flex";
        }

        function afficherModeLecture() {
            modeEdition = false;
            document.getElementById('btn_mode').innerText = "[ÉDITER LA BASE]";

            document.getElementById('r_titre').innerText = r.titre || 'SUJET INCONNU';
            document.getElementById('r_id_display').innerText = `UBC-${id.substring(0,6).toUpperCase()}`;
            
            document.getElementById('r_img').src = r.image_url && r.image_url.startsWith('http') ? r.image_url : `images/default_folder.png`;
            document.getElementById('r_date_display').innerText = new Date(r.created_at).toLocaleDateString('fr-FR');

            document.getElementById('r_details').innerHTML = `
                <div><strong>SUJET :</strong> ${r.titre || "Non classifié"}</div>
                <div><strong>SUPERVISEUR :</strong> ${r.auteur_enquete || "Anonyme"}</div>
                <div><strong>STATUT :</strong> SURVEILLANCE ACTIVE</div>
                <div><strong>MENACE :</strong> ÉVALUATION EN COURS</div>
            `;

            let contenuBrut = r.contenu || "Aucune donnée textuelle indexée.";
            pagesArray = contenuBrut.split('===PAGE===');
            pageCourante = 0; 

            document.getElementById('pagination_ui').style.display = pagesArray.length > 1 ? 'flex' : 'none';
            afficherPageCourante();
        }

        function afficherPageCourante() {
            let texteDeLaPage = pagesArray[pageCourante];
            
            // 1. Remplacement des images
            texteDeLaPage = texteDeLaPage.replace(/\[IMG:(.+?)\]/g, '<img src="$1" class="photo-incrustee" alt="Archive visuelle">');
            
            // 2. Création des GROS TITRES de section (##)
            texteDeLaPage = texteDeLaPage.replace(/##\s*(.+)/g, '<div class="section-titre">$1</div>');

            // 3. Création des SOUS-TITRES (#)
            texteDeLaPage = texteDeLaPage.replace(/#\s*(.+)/g, '<div class="sous-titre">$1</div>');

            document.getElementById('r_contenu').innerHTML = texteDeLaPage;
            document.getElementById('page_info').innerText = `BLOC ${pageCourante + 1} / ${pagesArray.length}`;
            document.getElementById('btn_prev').disabled = (pageCourante === 0);
            document.getElementById('btn_next').disabled = (pageCourante === pagesArray.length - 1);
        }

        function changerPage(direction) {
            pageCourante += direction;
            afficherPageCourante();
        }

        function afficherModeEdition() {
            modeEdition = true;
            document.getElementById('btn_mode').innerText = "[SAUVEGARDER]";
            document.getElementById('pagination_ui').style.display = 'none';

            document.getElementById('r_titre').innerHTML = `<input type="text" id="edit_titre" class="edit-input" style="font-size:24px;">`;
            document.getElementById('edit_titre').value = r.titre || '';
            
            document.getElementById('r_details').innerHTML = `
                <div style="grid-column: span 2;"><strong>LIEN IMAGE (SOURCE) :</strong><br><input type="text" id="edit_image_url" class="edit-input"></div>
                <div style="grid-column: span 2;"><strong>SUPERVISEUR :</strong><br><input type="text" id="edit_auteur" class="edit-input"></div>
            `;
            document.getElementById('edit_image_url').value = r.image_url || '';
            document.getElementById('edit_auteur').value = r.auteur_enquete || '';

            // Mise à jour de l'aide avec la commande sous-titre (#)
            let aideTexte = `<div style="font-size:13px; color:var(--danger-color); margin-bottom:15px; border: 1px solid var(--danger-color); padding: 10px;">
                COMMANDES TERMINAL DISPONIBLES :<br>
                - Titre principal : <strong>## Ton Titre</strong><br>
                - Sous-titre : <strong># Ton Sous-titre</strong><br>
                - Couper la page : <strong>===PAGE===</strong><br>
                - Insérer une image : <strong>[IMG:lien_de_l_image.jpg]</strong>
            </div>`;
            document.getElementById('r_contenu').innerHTML = aideTexte + `<textarea id="edit_contenu" class="edit-input"></textarea>`;
            document.getElementById('edit_contenu').value = r.contenu || '';
        }

        function basculerMode() {
            if (!modeEdition) { afficherModeEdition(); } 
            else { sauvegarderFiche(); }
        }

        async function sauvegarderFiche() {
            const btn = document.getElementById('btn_mode');
            btn.innerText = "[UPLOAD EN COURS...]";

            const modifications = {
                titre: document.getElementById('edit_titre').value,
                image_url: document.getElementById('edit_image_url').value,
                auteur_enquete: document.getElementById('edit_auteur').value,
                contenu: document.getElementById('edit_contenu').value 
            };

            const { error } = await supabaseClient.from('rapports_enquete').update(modifications).eq('id', id);

            if (error) {
                alert("ERREUR RÉSEAU");
                btn.innerText = "[RÉESSAYER]"; 
            } else {
                r = { ...r, ...modifications };
                afficherModeLecture(); 
            }
        }

        chargerFiche();
    </script>
</body>
</html>
