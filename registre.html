<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Base de données</title>
</head>
<body>
    <div class="container">
        
        <div class="terminal-header">
            <div>
                <h2 id="welcome-message">> BIENVENUE, AGENT_</h2>
                <p id="horloge">CALCUL DU TEMPS...</p>
            </div>
            <!-- Bouton de déconnexion utilisant ta classe d'animation -->
            <button class="btn-retour" onclick="deconnexion()" style="width: auto; padding: 7px 15px;">[ DÉCONNEXION ]</button>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <h1>SYSTÈME CENTRAL</h1>
            <p>Connexion sécurisée établie avec la base de données distante.</p>
        </div>
        
        <div class="menu-grid">
            <a href="personnages.html" class="card">REGISTRE</a>
            <a href="souches.html" class="card">BASE BIOLOGIQUE</a>
            <a href="organisations.html" class="card">ORGANISATIONS</a>
            <div onclick="ouvrirWorkspace()" class="card" style="cursor: pointer;">ESPACE DE TRAVAIL</div>
        </div>
    </div>

    <!-- Espace de travail superposé -->
    <div id="workspace-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); padding: 10px;">
        
        <div id="workspace-content" class="workspace-modal">
            
            <div style="text-align: left; margin-bottom: 20px;">
                <button class="btn-retour" onclick="fermerWorkspace()" style="width: auto; padding: 7px 15px;">[FERMER CONSOLE]</button>
            </div>

            <h1 style="font-size: 1.8em; color: var(--text-color); margin-bottom: 10px;">CONSOLE AGENT</h1>
            <p style="color: #666; font-size: 0.9em; margin-bottom: 40px; font-family: monospace;">Sélectionnez l'unité de traitement ou de consultation de données.</p>

            <div class="submenu-grid">
                <a href="rapports.html" class="card sub-card">RAPPORTS D'ENQUÊTE</a>
                <a href="journal.html" class="card sub-card">JOURNAL DE BORD</a>
            </div>
        </div>
    </div>

    <!-- Scripts Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- GESTION DE L'IDENTITÉ (Option 1 : Prénom uniquement) ---
        const nomComplet = localStorage.getItem('agentName') || 'INCONNU';
        // On coupe au niveau de l'espace et on garde le premier élément (0)
        const prenomAgent = nomComplet.split(' ')[0];
        
        document.getElementById('welcome-message').innerText = `> BIENVENUE, ${prenomAgent.toUpperCase()}_`;

        // --- SYSTÈME DE DÉCONNEXION ---
        async function deconnexion() {
            // Déconnexion sécurisée de Supabase
            await supabaseClient.auth.signOut();
            // Suppression de l'identité en mémoire
            localStorage.removeItem('agentName');
            // Renvoi vers le portail
            window.location.href = 'index.html';
        }

        // --- ANIMATIONS ET HORLOGE ---
        function ouvrirWorkspace() {
            const overlay = document.getElementById('workspace-overlay');
            const content = document.getElementById('workspace-content');
            
            overlay.style.display = 'flex';
            content.classList.add('modal-zoom'); 
        }

        function fermerWorkspace() {
            const overlay = document.getElementById('workspace-overlay');
            const content = document.getElementById('workspace-content');
            
            content.classList.remove('modal-zoom');
            overlay.style.display = 'none';
        }

        window.addEventListener('keydown', function(evenement) {
            if (evenement.key === 'Escape' || evenement.key === 'Esc') {
                fermerWorkspace();
            }
        });

        function majHorloge() {
            const horlogeElement = document.getElementById('horloge');
            const maintenant = new Date();
            
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            
            let dateTexte = maintenant.toLocaleDateString('fr-FR', options);
            dateTexte = dateTexte.toUpperCase(); 
            horlogeElement.innerText = dateTexte;
        }

        majHorloge();
        setInterval(majHorloge, 1000);
    </script>
</body>
</html>
