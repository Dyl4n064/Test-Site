<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rapports d'Enquêtes</title>
</head>
<body>
    <div class="container container-roster">
        
        <div class="terminal-header" style="margin-bottom: 20px;">
            <button class="btn-retour" onclick="window.location.href='registre.html'" style="width: auto; padding: 7px 15px;">[RETOUR]</button>
            <button class="btn-retour btn-enregistrer" onclick="window.location.href='create_rapport.html'" style="width: auto; padding: 7px 15px;">[RÉDIGER UN RAPPORT]</button>
        </div>

        <h1>ARCHIVES DES ENQUÊTES</h1>
        
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="RECHERCHE DE RAPPORT..." onkeyup="filtrerRapports()">
        </div>

        <div class="roster-grid" id="grid_rapports">
            <p style="text-align: center; width: 100%;">[ CONNEXION AU SERVEUR... ]</p>
        </div>
    </div>

    <div class="mentions-legales">
        <p><strong>Mentions Légales :</strong> Ce registre est édité à titre personnel par Dyl4n06. Contact : dylancapron064@gmail.com.</p>
        <p>Hébergement : GitHub Pages (GitHub Inc., 88 Colin P Kelly Jr St, San Francisco, CA 94107, USA).</p>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let tousLesRapports = [];

        async function chargerRapports() {
            const { data, error } = await supabaseClient.from('rapports_enquete').select('*').order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                document.getElementById('grid_rapports').innerHTML = "<p style='color:red;'>[ ERREUR DE CONNEXION ]</p>";
                return;
            }
            
            tousLesRapports = data;
            afficherRapports(tousLesRapports);
        }

        function afficherRapports(liste) {
            const grid = document.getElementById('grid_rapports');
            grid.innerHTML = '';

            if (liste.length === 0) {
                grid.innerHTML = "<p style='text-align:center; width:100%; color:var(--text-color);'>AUCUN RAPPORT TROUVÉ DANS LA BASE DE DONNÉES.</p>";
                return;
            }

            liste.forEach(r => {
                const imgDisplay = r.image_url ? r.image_url : 'images/default_folder.png';
                // Utilisation de la classe card pour le design[cite: 3]
                grid.innerHTML += `
                    <a href="fiche_rapport.html?id=${r.id}" class="card sub-card">
                        <img src="${imgDisplay}" style="width:100%; height:120px; object-fit:cover; border-bottom:1px solid var(--accent-color); margin-bottom:10px;">
                        <h3 style="margin:5px 0; font-size:1em;">${r.titre.toUpperCase()}</h3>
                        <p style="margin:0; font-size:0.8em; color:var(--text-color);">Agent : ${r.auteur_enquete}</p>
                    </a>
                `;
            });
        }

        function filtrerRapports() {
            const texteRecherche = document.getElementById('searchBar').value.toLowerCase();
            const rapportsFiltres = tousLesRapports.filter(r => 
                r.titre.toLowerCase().includes(texteRecherche) || 
                r.auteur_enquete.toLowerCase().includes(texteRecherche)
            );
            afficherRapports(rapportsFiltres);
        }

        chargerRapports();
    </script>
</body>
</html>
