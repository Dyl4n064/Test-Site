<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rapport d'Enquête</title>
</head>
<body>
    <div class="container container-roster">
        
        <div class="terminal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <button class="btn-retour" onclick="window.location.href='rapports.html'" style="width: auto; padding: 7px 15px;">[RETOUR ARCHIVES]</button>
            <button id="btn_mode" class="btn-retour btn-enregistrer" onclick="basculerMode()" style="width: auto; padding: 7px 15px;">[ÉDITER LE RAPPORT]</button>
        </div>

        <div class="profile-layout" style="display: none;" id="content_layout">
            <aside class="infobox">
                <h2 id="r_titre" style="text-align: center; margin-top: 0; margin-bottom: 15px; word-wrap: break-word;">CHARGEMENT...</h2>
                
                <img id="r_img" src="" alt="Couverture" style="width:100%; max-height:250px; object-fit:cover; background:#000; border-bottom:1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;">
                
                <div class="data-scan" id="r_details">
                </div>
            </aside>
            
            <main>
                <h2 style="margin-top:0; color: var(--accent-color);">> COMPTE RENDU DÉTAILLÉ</h2>
                <div id="r_contenu" style="white-space: pre-wrap; line-height: 1.6; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);"></div>
            </main>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let r = {}; 
        let id = null;
        let modeEdition = false;

        async function chargerFiche() {
            id = new URLSearchParams(window.location.search).get('id');
            
            if (!id) {
                document.getElementById('r_titre').innerText = "ERREUR : ID MANQUANT";
                document.getElementById('content_layout').style.display = "flex";
                return;
            }

            // Récupération du rapport via l'ID[cite: 2]
            const { data, error } = await supabaseClient.from('rapports_enquete').select('*').eq('id', id).single();

            if (error || !data) {
                document.getElementById('r_titre').innerText = "RAPPORT INTROUVABLE";
                document.getElementById('content_layout').style.display = "flex";
                return;
            }

            r = data;
            document.getElementById('content_layout').style.display = "flex";
            afficherModeLecture();
        }

        function afficherModeLecture() {
            modeEdition = false;
            document.getElementById('btn_mode').innerText = "[ÉDITER LE RAPPORT]";

            document.getElementById('r_titre').innerText = r.titre ? `${r.titre.toUpperCase()}` : 'DOSSIER SANS TITRE';
            
            const imageSrc = r.image_url && r.image_url.startsWith('http') ? r.image_url : `images/default_folder.png`;
            document.getElementById('r_img').src = imageSrc;

            // Formatage de la date générée par Supabase
            const dateCreation = new Date(r.created_at).toLocaleDateString('fr-FR');

            document.getElementById('r_details').innerHTML = `
                <label>AGENT EN CHARGE</label>
                <p>${r.auteur_enquete || "Inconnu"}</p>
                <label>DATE D'ENREGISTREMENT</label>
                <p>${dateCreation}</p>
            `;

            document.getElementById('r_contenu').innerText = r.contenu || "Aucun contenu textuel consigné pour cette enquête.";
        }

        function afficherModeEdition() {
            modeEdition = true;
            document.getElementById('btn_mode').innerText = "[SAUVEGARDER LES MODIFICATIONS]";

            // Champs d'édition avec formatage CSS intégré[cite: 2]
            document.getElementById('r_titre').innerHTML = `<input type="text" id="edit_titre" value="${r.titre || ''}" style="width: 100%; text-align: center; color: var(--accent-color); background: transparent; border: 1px dashed var(--accent-color);">`;
            
            document.getElementById('r_details').innerHTML = `
                <label>URL DE L'IMAGE</label>
                <input type="text" id="edit_image_url" value="${r.image_url || ''}">
                <label>AGENT EN CHARGE</label>
                <input type="text" id="edit_auteur" value="${r.auteur_enquete || ''}">
            `;

            document.getElementById('r_contenu').innerHTML = `<textarea id="edit_contenu" rows="20" style="width: 100%; box-sizing: border-box; background: transparent; color: var(--text-color); border: 1px dashed var(--accent-color); padding: 10px; font-family: inherit;">${r.contenu || ''}</textarea>`;
        }

        function basculerMode() {
            if (!modeEdition) {
                afficherModeEdition();
            } else {
                sauvegarderFiche();
            }
        }

        async function sauvegarderFiche() {
            const btn = document.getElementById('btn_mode');
            btn.innerText = "[SYNCHRONISATION EN COURS...]";

            const modifications = {
                titre: document.getElementById('edit_titre').value,
                image_url: document.getElementById('edit_image_url').value,
                auteur_enquete: document.getElementById('edit_auteur').value,
                contenu: document.getElementById('edit_contenu').value
            };

            const { error } = await supabaseClient.from('rapports_enquete').update(modifications).eq('id', id);

            if (error) {
                alert("ÉCHEC DE LA SYNCHRONISATION : Erreur serveur.");
                console.error(error);
                btn.innerText = "[RETENUE DE SÉCURITÉ : RÉESSAYER]"; 
            } else {
                r = { ...r, ...modifications };
                afficherModeLecture();
            }
        }

        chargerFiche();
    </script>
</body>
</html>
